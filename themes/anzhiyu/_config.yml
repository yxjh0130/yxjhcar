# ==========================================
# 网站统计配置 (Analysis)
# ==========================================
# Analysis
# --------------------------------------

# 百度统计
# https://tongji.baidu.com/web/welcome/login
baidu_analytics: # 百度统计ID

# Google Analytics
# https://analytics.google.com/analytics/web/
google_analytics: # Google Analytics ID

# CNZZ/友盟统计
# https://www.umeng.com/
cnzz_analytics: # CNZZ统计ID

# Cloudflare Analytics
# https://www.cloudflare.com/zh-tw/web-analytics/
cloudflare_analytics: # Cloudflare 统计ID

# Microsoft Clarity
# https://clarity.microsoft.com/
microsoft_clarity: # Microsoft Clarity ID

# ==========================================
# 广告配置 (Advertisement)
# ==========================================
# Advertisement
# --------------------------------------

# Google Adsense (谷歌广告)
google_adsense:
  enable: false # 是否启用谷歌广告
  auto_ads: true # 是否启用自动广告
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js # 广告JS脚本
  client: # 广告客户ID
  enable_page_level_ads: true # 是否启用页面级广告

# 手动插入广告
# ad:
#   index: # 首页广告
#   aside: # 侧边栏广告
#   post: # 文章页广告

# ==========================================
# 站长验证配置 (Verification)
# ==========================================
# Verification (站长验证)
# --------------------------------------

# 站点验证（用于搜索引擎站长工具验证）
site_verification:
  - name: google-site-verification # Google 搜索控制台验证
    content: xxx # 验证内容
  - name: baidu-site-verification # 百度站长平台验证
    content: code-xxx # 验证码
  - name: msvalidate.01 # Bing 站长工具验证
    content: xxx # 验证内容

# ==========================================
# 美化/效果配置 (Beautify/Effect)
# ==========================================
# Beautify/Effect (美化/效果)
# --------------------------------------

# 主题颜色自定义
# 注意: 颜色值必须使用双引号包裹，如 "#000"，否则可能出错！
theme_color:
  enable: true # 是否启用自定义主题颜色
  main: "#425AEF" # 主色调（浅色模式）
  dark_main: "#f2b94b" # 主色调（深色模式）
  paginator: "#425AEF" # 分页器颜色
  #   button_hover: "#FF7242" # 按钮悬停颜色
  text_selection: "#2128bd" # 文字选中颜色
  link_color: "var(--anzhiyu-fontcolor)" # 链接颜色
  meta_color: "var(--anzhiyu-fontcolor)" # 元信息颜色
  hr_color: "#4259ef23" # 水平分割线颜色
  code_foreground: "#fff" # 代码前景色
  code_background: "var(--anzhiyu-code-stress)" # 代码背景色
  toc_color: "#425AEF" # 目录颜色
  #   blockquote_padding_color: "#425AEF" # 引用块边框颜色
  #   blockquote_background_color: "#425AEF" # 引用块背景颜色
  scrollbar_color: "var(--anzhiyu-scrollbar)" # 滚动条颜色
  meta_theme_color_light: "#f7f9fe" # 浅色模式meta主题色
  meta_theme_color_dark: "#18171d" # 深色模式meta主题色

# 移动端侧栏配置
sidebar:
  site_data: # 站点数据
    archive: false # 是否显示归档
    tag: false # 是否显示标签
    category: false # 是否显示分类
  menus_items: true # 是否显示菜单项
  tags_cloud: false # 是否显示标签云
  display_mode: true # 是否显示昼夜切换
  nav_menu_project: false # 是否显示导航项目

# 文章h2标题添加分隔线
h2Divider: false # 是否在h2标题下添加分隔线

# 表格隔行变色
table_interlaced_discoloration: false # 是否启用表格隔行变色

# 首页双栏显示
article_double_row: true # 是否启用首页文章双栏布局

# 首页顶部图片设置
# default: top_img全屏显示，site_info在中间
index_site_info_top: # 主页标题距离顶部距离，如: 300px/300em/300rem/10%
index_top_img_height: # 主页top_img高度，如: 300px/300em/300rem

# 分类和标签页的UI设置
# index: 与首页UI相同
# default: 与归档页UI相同
category_ui: # 分类页UI，留空或 index
tag_ui: # 标签页UI，留空或 index

# 页脚背景
footer_bg: false # 是否启用页脚背景

# 右下角按钮距离底部的距离 (默认单位: px)
rightside-bottom: 100px

# ==========================================
# 背景特效配置 (Background Effects)
# ==========================================
# Background effects (背景特效)
# --------------------------------------

# canvas_ribbon (静止彩带背景)
# https://github.com/hustcc/ribbon.js
canvas_ribbon:
  enable: false # 是否启用彩带背景
  size: 150 # 彩带大小
  alpha: 0.6 # 彩带透明度
  zIndex: -1 # 层级
  click_to_change: false # 是否点击切换彩带
  mobile: false # 移动端是否启用

# Fluttering Ribbon (动态彩带)
canvas_fluttering_ribbon:
  enable: false # 是否启用动态彩带
  mobile: false # 移动端是否启用

# canvas_nest (动态线条背景)
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  enable: false # 是否启用动态线条
  color: "0,0,255" # 线条颜色，RGB值，用逗号分隔
  opacity: 0.7 # 线条透明度 (0~1)
  zIndex: -1 # 层级
  count: 99 # 线条数量
  mobile: false # 移动端是否启用

# 打字特效 (Typewriter Effect)
# https://github.com/disjukr/activate-power-mode
activate_power_mode:
  enable: false # 是否启用打字特效
  colorful: true # 是否开启粒子动画 (冒光特效)
  shake: false # 是否开启抖动特效
  mobile: false # 移动端是否启用

# 鼠标点击效果: 烟花特效
fireworks:
  enable: false # 是否启用烟花特效
  zIndex: 9999 # 层级: -1 或 9999
  mobile: false # 移动端是否启用

# 鼠标点击效果: 爱心
click_heart:
  enable: false # 是否启用爱心特效
  mobile: false # 移动端是否启用

# 鼠标点击效果: 文字
ClickShowText:
  enable: false # 是否启用点击显示文字
  text: # 点击显示的文字列表
    # - I
    # - LOVE
    # - YOU
  fontSize: 15px # 文字大小
  random: false # 是否随机显示文字
  mobile: false # 移动端是否启用

# 网站默认显示模式
# light (默认浅色) / dark (深色)
display_mode: light

# 页面美化
beautify:
  enable: true # 是否启用美化
  field: post # 生效范围: site=全站 / post=文章页
  title-prefix-icon: '\f0c1' # 标题前缀图标 (Font Awesome unicode)
  title-prefix-icon-color: "#F47466" # 标题前缀图标颜色

# 全局字体设置
# 非必要不要修改以下设置
font:
  global-font-size: 16px # 全局字体大小
  code-font-size: # 代码字体大小
  font-family: # 全局字体族
  code-font-family: consolas, Menlo, "PingFang SC", "Microsoft JhengHei", "Microsoft YaHei", sans-serif # 代码字体族

# 站点标题字体设置
# 左上角网站名字和主页居中网站名字的字体
blog_title_font:
  font_link: # 字体链接 (如 Google Fonts)
  font-family: PingFang SC, 'Hiragino Sans GB', 'Microsoft JhengHei', 'Microsoft YaHei', sans-serif # 字体族

# 水平分隔线图标设置
hr_icon:
  enable: true # 是否启用分隔线图标
  icon: \f0c4 # Font Awesome 图标的 unicode 值，如 '\f0c4'
  icon-top: # 图标距离顶部距离

# 主页副标题 (subtitle)
subtitle:
  enable: false # 是否启用主页副标题
  # Typewriter Effect (打字效果)
  effect: true # 是否启用打字效果
  # Effect Speed Options (打字效果速度参数)
  startDelay: 300 # 打字开始前延迟 (毫秒)
  typeSpeed: 150 # 打字速度 (毫秒)
  backSpeed: 50 # 退格速度 (毫秒)
  # loop (循环打字)
  loop: true # 是否循环打字
  # source 调用第三方服务
  # source: false 关闭调用
  # source: 1  调用一言网的一句话（简体） https://hitokoto.cn/
  # source: 2  调用一句网（简体） http://yijuzhan.com/
  # source: 3  调用今日诗词（简体） https://www.jinrishici.com/
  # subtitle 会先显示 source , 再显示 sub 的内容
  source: 1 # 一言来源
  # 如果关闭打字效果，subtitle 只会显示 sub 的第一行文字
  sub: # 自定义副标题文字列表
    # - 生活明朗&#44;万物可爱&#44;人间值得&#44;未来可期.

# 加载动画配置
preloader:
  enable: true # 是否启用加载动画
  # source 加载动画类型
  # 1. fullpage-loading (全屏加载)
  # 2. pace (进度条)
  # else all (其他值使用全部)
  source: 3 # 加载动画类型
  # pace 主题 (https://codebyzach.github.io/pace/)
  pace_css_url: # pace CSS 地址
  # avatar: https://npm.elemecdn.com/anzhiyu-blog-static@1.0.4/img/avatar.jpg # 加载动画自定义头像
  avatar: /avatar.png # 加载动画自定义头像

# ==========================================
# 侧边栏配置 (Aside)
# ==========================================
# aside (侧边栏)
# --------------------------------------

aside:
  enable: true # 是否启用侧边栏
  hide: false # 是否隐藏侧边栏
  button: true # 是否显示侧边栏切换按钮
  mobile: false # 移动端是否显示
  position: right # 位置: left=左侧 / right=右侧
  display: # 控制对应页面是否显示侧边栏
    archive: true # 归档页
    tag: true # 标签页
    category: true # 分类页
  # 作者卡片
  card_author:
    enable: true # 是否显示作者卡片
    description: # 作者描述，默认为站点描述
    name_link: / # 作者名称链接
  # 公告卡片
  card_announcement:
    enable: false # 是否显示公告
    content: 欢迎来看我的博客鸭~ # 公告内容
  # 微信卡片
  card_weixin:
    enable: false # 是否显示微信卡片
    face: https://bu.dusays.com/2023/01/13/63c02edf44033.png # 微信正面图片
    backFace: https://bu.dusays.com/2023/05/13/645fa415e8694.png # 微信背面图片
  # 最新文章卡片
  card_recent_post:
    enable: true # 是否显示最新文章
    limit: 5 # 显示数量，设为0则显示全部
    sort: date # 排序方式: date=日期 / updated=更新
    sort_order: # 排序顺序，非必要不修改
  # 分类卡片
  card_categories:
    enable: true # 是否显示分类
    limit: 8 # 显示数量，设为0则显示全部
    expand: true # 展开方式: none/true/false
    sort_order: # 排序顺序，非必要不修改
  # 标签卡片
  card_tags:
    enable: true # 是否显示标签
    limit: 40 # 显示数量，设为0则显示全部
    color: false # 是否显示标签颜色
    sort_order: # 排序顺序，非必要不修改
    highlightTags: # 高亮标签列表
      # - Hexo
      # - 前端
  # 归档卡片
  card_archives:
    enable: true # 是否显示归档
    type: monthly # 归档类型: yearly=按年 / monthly=按月
    format: MMMM YYYY # 日期格式，如: YYYY年MM月
    order: -1 # 排序: 1=升序 / -1=降序
    limit: 8 # 显示数量，设为0则显示全部
    sort_order: # 排序顺序，非必要不修改
  # 网站信息卡片
  card_webinfo:
    enable: true # 是否显示网站信息
    post_count: true # 是否显示文章总数
    last_push_date: false # 是否显示最后更新时间
    sort_order: # 排序顺序，非必要不修改

# ==========================================
# 访问统计配置 (Busuanzi)
# ==========================================
# busuanzi 不蒜子统计 PV/UV
# 访问人数
busuanzi:
  site_uv: false # 是否显示站点UV (独立访客数)
  site_pv: false # 是否显示站点PV (页面访问量)
  page_pv: false # 是否显示页面PV

# 网站运行时间
# 格式: 月/日/年 时间 或 年/月/日 时间
runtimeshow:
  enable: true # 是否显示网站运行时间
  publish_date: 6/26/2026 00:00:00 # 网站发布时间

# 控制台最新评论
newest_comments:
  enable: true # 是否启用最新评论
  sort_order: # 排序顺序，非必要不修改
  limit: 6 # 显示数量
  storage: 10 # 存储时间 (分钟)，数据保存到 localStorage
  avatar: true # 是否显示头像

# ==========================================
# 右下角按钮配置 (Bottom Right Button)
# ==========================================
# Bottom right button (右下角按钮)
# --------------------------------------

# 简繁转换
translate:
  enable: true # 是否启用简繁转换
  default: 简 # 按钮默认文字
  rightMenuMsgDefault: "轉為繁體" # 右键菜单默认文字
  defaultEncoding: 1 # 网站默认语言: 1=繁体中文 / 2=简体中文
  translateDelay: 0 # 转换延迟时间
  msgToTraditionalChinese: "繁" # 当前为简体时按钮文字
  msgToSimplifiedChinese: "简" # 当前为繁体时按钮文字
  rightMenuMsgToTraditionalChinese: "转为繁体" # 右键菜单转为繁体
  rightMenuMsgToSimplifiedChinese: "转为简体" # 右键菜单转为简体

# 阅读模式
readmode: true # 是否启用阅读模式

# ==========================================
# 中控台配置 (Center Console)
# ==========================================
# 中控台 (文章页面底部显示的控制面板)
centerConsole:
  enable: true # 是否启用中控台
  # 标签卡片
  card_tags:
    enable: true # 是否显示标签
    limit: 40 # 显示数量，设为0则显示全部
    color: true # 是否显示标签颜色
    sort_order: # 排序顺序，非必要不修改
    highlightTags: # 高亮标签列表
      # - Hexo
      # - 前端
  # 归档卡片
  card_archives:
    enable: true # 是否显示归档
    type: monthly # 归档类型: yearly=按年 / monthly=按月
    format: MMMM YYYY # 日期格式，如: YYYY年MM月
    order: -1 # 排序: 1=升序 / -1=降序
    limit: 8 # 显示数量，设为0则显示全部
    sort_order: # 排序顺序，非必要不修改

# ==========================================
# 深色模式配置 (Dark Mode)
# ==========================================
# dark mode (深色模式)
darkmode:
  enable: true # 是否启用深色模式
  button: true # 是否显示切换按钮
  # 自动切换深色/浅色模式
  # autoChangeMode: 1  跟随系统设置，如系统不支持深色模式则在18:00-6:00间切换
  # autoChangeMode: 2  在18:00-6:00间切换深色模式
  # autoChangeMode: false  关闭自动切换
  autoChangeMode: 1 # 自动切换模式
  start: # 开始时间 (如 8 表示8点)
  end: # 结束时间 (如 22 表示22点)

# 右下角按钮顺序配置
# 非必要请不要修改
# 可选: readmode,translate,darkmode,hideAside,toc,chat,comment
# 不要重复
rightside_item_order:
  enable: false # 是否启用自定义顺序
  hide: # 需要隐藏的按钮，如: readmode,translate,darkmode,hideAside
  show: # 需要显示的按钮，如: toc,chat,comment

# ==========================================
# 图片灯箱配置 (Lightbox)
# ==========================================
# Lightbox (图片大图查看模式)
# 只能选择一个，或者两个都不选
# --------------------------------------

# medium-zoom 图片缩放
# https://github.com/francoischalifour/medium-zoom
medium_zoom: false # 是否启用 medium-zoom

# fancybox 图片灯箱
# http://fancyapps.com/fancybox/3/
fancybox: true # 是否启用 fancybox

# ==========================================
# 标签外挂配置 (Tag Plugins)
# ==========================================
# Tag Plugins settings (标籤外挂)
# --------------------------------------

# mermaid 图表
# https://github.com/mermaid-js/mermaid
mermaid:
  enable: false # 是否启用 mermaid
  # 内置主题: default/forest/dark/neutral
  theme:
    light: default # 浅色模式主题
    dark: dark # 深色模式主题

# Note 提示框 (Bootstrap Callout 风格)
note:
  # Note 标签样式:
  #  - simple    bs-callout 旧版提示样式 (默认)
  #  - modern    bs-callout 新版 (v2-v3) 提示样式
  #  - flat      扁平化提示样式，带背景色
  #  - disabled  禁用所有 note 标签的 CSS 样式
  style: flat # 提示框样式
  icons: true # 是否显示图标
  border_radius: 3 # 边框圆角
  # 背景色偏移量百分比 (modern: -12|12; flat: -18|6)
  light_bg_offset: 0

# 图标配置
icons:
  ali_iconfont_js: # 阿里图标 symbol 引用链接，主题会加载 symbol 引用
  fontawesome: false # 是否启用 FontAwesome 6 图标
  fontawesome_animation_css: # FontAwesome 动画CSS，如有填写则加载

# ==========================================
# 其他配置 (Other)
# ==========================================
# other
# --------------------------------------

# Pjax (页面无刷新加载)
# 可能包含bug且不稳定，发现问题请反馈
# https://github.com/MoOx/pjax
pjax:
  enable: true # 是否启用 Pjax
  exclude: # 排除的页面/元素
    # - xxxx
    # - xxxx

# APlayer/Meting 音乐播放器注入
aplayerInject:
  enable: true # 是否启用音乐播放器
  per_page: true # 是否每页加载

# Snackbar (Toast 弹窗通知)
# https://github.com/polonel/SnackBar
# position 弹窗显示位置
# 可选: top-left / top-center / top-right / bottom-left / bottom-center / bottom-right
snackbar:
  enable: true # 是否启用弹窗通知
  position: top-center # 弹窗位置
  bg_light: "#425AEF" # 浅色模式弹窗背景色
  bg_dark: "#1f1f1f" # 深色模式弹窗背景色

# instant.page (页面预加载)
# https://instant.page/
instantpage: true # 是否启用即时页面预加载

# pangu.js (中英文之间添加空格)
# https://github.com/vinta/pangu.js
pangu:
  enable: false # 是否启用中英文空格
  field: site # 生效范围: site=全站 / post=文章页

# 图片懒加载
# https://github.com/verlok/vanilla-lazyload
lazyload:
  enable: true # 是否启用图片懒加载
  field: site # 生效范围: site=全站 / post=文章页
  placeholder: # 占位图片
  blur: true # 是否启用模糊加载效果
  progressive: true # 是否启用渐进式加载

# ==========================================
# PWA 配置 (Progressive Web App)
# ==========================================
# PWA (渐进式网页应用)
# https://github.com/JLHwung/hexo-offline
# ---------------
pwa:
  enable: false # 是否启用 PWA
  startup_image_enable: true # 是否启用启动画面
  manifest: /manifest.json # manifest 文件路径
  theme_color: var(--anzhiyu-main) # PWA 主题色
  mask_icon: /img/siteicon/apple-icon-180.png # Safari 遮罩图标
  apple_touch_icon: /img/siteicon/apple-icon-180.png # Apple 触摸图标
  bookmark_icon: /img/siteicon/apple-icon-180.png # 书签图标
  favicon_32_32: /img/siteicon/32.png # 32x32 favicon
  favicon_16_16: /img/siteicon/16.png # 16x16 favicon

# Open Graph 元标签
# https://developers.facebook.com/docs/sharing/webmasters/
Open_Graph_meta: true # 是否启用 Open Graph 元标签 (用于社交分享)

# 添加浏览器厂商前缀以确保兼容性
css_prefix: true # 是否添加 CSS 浏览器前缀

# ==========================================
# 首页顶部配置 (Home Top)
# ==========================================
# 首页顶部相关配置
home_top:
  enable: true # 是否启用首页顶部自定义区域
  timemode: date # 时间显示模式: date=发布时间 / updated=更新时间
  title: 生活明朗 # 首页标题
  subTitle: 万物可爱。 # 首页副标题
  siteText: anheyu.com # 站点文字
  # 分类导航
  category:
    - name: 资源下载 # 分类名称
      path: /download/ # 分类路径
      shadow: var(--anzhiyu-shadow-blue) # 阴影颜色
      class: blue # CSS类名
      icon: anzhiyu-icon-dove # 图标
    - name: 固件功能 # 分类名称
      path: /categories/大学生涯/ # 分类路径
      shadow: var(--anzhiyu-shadow-red) # 阴影颜色
      class: red # CSS类名
      icon: anzhiyu-icon-fire # 图标
    - name: 教程 # 分类名称
      path: /categories/生活日常/ # 分类路径
      shadow: var(--anzhiyu-shadow-green) # 阴影颜色
      class: green # CSS类名
      icon: anzhiyu-icon-book # 图标
  default_descr: 再怎么看我也不知道怎么描述它的啦！ # 默认描述
  # Swiper 轮播图
  swiper:
    enable: false # 是否启用轮播
    swiper_css: https://npm.elemecdn.com/anzhiyu-theme-static@1.0.0/swiper/swiper.min.css # Swiper CSS依赖
    swiper_js: https://npm.elemecdn.com/anzhiyu-theme-static@1.0.0/swiper/swiper.min.js # Swiper JS依赖
  # 横幅广告
  banner:
    tips: # 提示文字
    title: # 横幅标题
    # image: https://bu.dusays.com/2023/05/13/645fa3cf90d70.webp # 横幅图片
    image: /新品主题.png # 横幅图片
    # link: https://docs.anheyu.com/ # 横幅链接

# ==========================================
# 朋友圈配置 (Friends Vue)
# ==========================================
# 朋友圈配置 (友链朋友圈)
friends_vue:
  enable: false # 是否启用朋友圈
  vue_js: https://npm.elemecdn.com/anzhiyu-theme-static@1.1.1/friends/index.4f887d95.js # Vue JS 依赖
  apiurl: # 朋友圈后端地址
  top_tips: 使用 友链朋友圈 订阅友链最新文章 # 顶部提示文字
  top_background: # 顶部背景图片

# ==========================================
# 其他特效配置
# ==========================================

# 深色模式粒子效果 (canvas)
universe:
  enable: true # 是否启用深色模式星空粒子效果

# 页面卡片顶部气泡升起效果
bubble:
  enable: false # 是否启用气泡效果

# 控制台打印信息
console:
  enable: true # 是否在浏览器控制台打印信息

# 51la 统计配置
LA:
  enable: false # 是否启用51la统计
  ck: # 51la 统计密钥
  LingQueMonitorID: # 灵雀监控ID

# Umami 统计配置（关于页面访问统计卡片）
# 文档: https://umami.is/docs/api
umami:
  enable: false # 是否启用 Umami 统计
  apiHost: # Umami API 地址，如 https://analytics.example.com
  websiteId: # 网站 ID
  token: # API Token（在 Umami 后台 Settings -> API Keys 中生成）

# ==========================================
