# 音乐页面默认加载的歌单: 1. nav_music 2. custom
music_page_default: nav_music

# 评论匿名邮箱
visitorMail:
  enable: true # 是否启用匿名邮箱
  mail: "" # 匿名邮箱地址

# 文章底部工具配置
ptool:
