# ==========================================
# 导航菜单配置 (Navigation Menu)
# ==========================================
menu:
  # 文章分类菜单
  # 文章:
  #   隧道: /archives/ || anzhiyu-icon-box-archive
  #   分类: /categories/ || anzhiyu-icon-shapes
  #   标签: /tags/ || anzhiyu-icon-tags

  # 音乐馆
  音乐馆: /music/?id=1708664797&server=tencent || anzhiyu-icon-music

  # 下载菜单
  下载:
    固件: /download/firmware/ || anzhiyu-icon-code
    卡丁车APP: /download/app/ || anzhiyu-icon-android
    工具软件包: /download/tools/ || anzhiyu-icon-zip
    遥控器外壳: /download/shell/ || anzhiyu-icon-box

  # 友链菜单
  # 友链:
  #   友人帐: /link/ || anzhiyu-icon-link
  #   朋友圈: /fcircle/ || anzhiyu-icon-artstation
  #   留言板: /comments/ || anzhiyu-icon-envelope

  # 个人页面菜单
  # 我的:
  #   音乐馆: /music/?id=1708664797&server=tencent
  #   追番页: /bangumis/ || anzhiyu-icon-bilibili
  #   相册集: /album/ || anzhiyu-icon-images
  #   小空调: /air-conditioner/ || anzhiyu-icon-fan

  # 关于菜单
  # 关于:
  #   关于本人: /about/ || anzhiyu-icon-paper-plane
  #   闲言碎语: /essay/ || anzhiyu-icon-lightbulb
  #   随便逛逛: javascript:toRandomPost() || anzhiyu-icon-shoe-prints1

# ==========================================
# 顶部导航栏配置 (nav)
# ==========================================
# nav相关配置
nav:
  enable: false # 是否启用导航栏
  travelling: false # 是否开启旅行者/开往模式
  clock: true # 是否显示时钟
  # 导航栏项目列表
  menu: []
    # - title: 网页 # 导航栏分组标题
    #   item:
    #     - name: 烧录器 # 项目名称
    #       link: https://www.icworkshop.com/ # 跳转链接
    #       icon: /img/favicon.ico # 项目图标
    # - title: 项目 # 导航栏分组标题
    #   item:
    #     - name: 工具下载 # 项目名称
    #       link: https://www.icworkshop.com/user/clientDownload # 跳转链接
    #       icon: https://image.anheyu.com/favicon.ico # 项目图标

# ==========================================
# 哀悼日配置 (Mourn)
# ==========================================
# mourn （哀悼日，指定日期网站简单变灰，不包括滚动条）
# 注意： 仅网站首页变灰，其他页面正常显示
mourn:
  enable: false # 是否启用哀悼模式
  days: [4-5, 5-12, 7-7, 9-18, 12-13] # 哀悼日期列表（月-日格式）

# ==========================================
# 代码块配置 (Code Blocks)
# ==========================================
# Code Blocks (代码相关)
# --------------------------------------

highlight_theme: light # 代码高亮主题: darker / pale night / light / ocean / mac / mac light / false
highlight_copy: true # 是否显示复制按钮 (copy button)
highlight_lang: true # 是否显示代码语言 (show the code language)
highlight_shrink: false # 是否收缩代码块: true=收缩 / false=展开 / none=展开且隐藏按钮
highlight_height_limit: 330 # 代码块最大高度限制 (单位: px)
code_word_wrap: false # 代码是否自动换行

# ==========================================
# 复制内容配置 (Copy Settings)
# ==========================================
# copy settings
# copyright: 复制的内容后面加上版权信息
# copy: enable 复制后弹窗提示版权信息
copy:
  enable: true # 是否启用复制功能
  copyright:
    enable: true # 是否启用复制后加版权信息
    limit_count: 50 # 小于该字数时不添加版权信息

# ==========================================
# 社交图标配置 (Social Settings)
# ==========================================
# social settings (社交图标设置)
# 格式: name: link || icon
social:
  # Github: https://github.com/anzhiyu-c || anzhiyu-icon-github
  # BiliBili: https://space.bilibili.com/372204786 || anzhiyu-icon-bilibili

# ==========================================
# 作者卡片状态配置 (Author Status)
# ==========================================
# 作者卡片 状态
author_status:
  enable: false # 是否启用作者状态卡片
  # 状态图片，可以是任何图片，建议放表情包或者emoji图片，效果都很好
  # 表情包速查: https://emotion.xiaokang.me/
  statusImg: "https://bu.dusays.com/2023/08/24/64e6ce9c507bb.png"
  # 技能标签列表
  skills:
    # - 🤖️ 数码科技爱好者
    # - 🔍 分享与热心帮助
    # - 🏠 智能家居小能手
    # - 🔨 设计开发一条龙
    # - 🤝 专修交互与设计
    # - 🏃 脚踏实地行动派
    # - 🧱 团队小组发动机
    # - 💢 壮汉人狠话不多

# ==========================================
# 搜索配置 (Search)
# ==========================================
# search (搜索)
# --------------------------------------

# Algolia 搜索 (Algolia search)
algolia_search:
  enable: false # 是否启用 Algolia 搜索
  hits:
    per_page: 6 # 每页搜索结果数量
  # 搜索标签过滤
  tags:
    # - 前端
    # - Hexo

# Docsearch (Algolia Docsearch 文档搜索)
# 申请和配置文档: https://docsearch.algolia.com/
# 爬虫管理控制台: https://crawler.algolia.com/
# 设置: https://www.algolia.com/
docsearch:
  enable: false # 是否启用 Docsearch
  appId: # 应用ID (邮件中查看)
  apiKey: # API密钥 (邮件中查看)
  indexName: # 索引名称 (邮件中查看)
  option: # 其他可选配置

# 本地搜索 (Local search)
local_search:
  enable: false # 是否启用本地搜索
  preload: true # 是否预加载搜索数据
  CDN: # 搜索CDN地址

# ==========================================
# 数学公式配置 (Math)
# ==========================================
# Math (数学)
# --------------------------------------
# per_page 说明:
# true:  每一页都加载数学公式js脚本
# false: 需要时加载，须在Markdown Front-matter 加上 mathjax: true

# MathJax 数学公式渲染
mathjax:
  enable: false # 是否启用 MathJax
  per_page: false # 是否每页加载

# KaTeX 数学公式渲染
katex:
  enable: false # 是否启用 KaTeX
  per_page: false # 是否每页加载
  hide_scrollbar: true # 是否隐藏数学公式的滚动条

# ==========================================
# 图片设置 (Image)
# ==========================================
# Image (图片设置)
# --------------------------------------

# Favicon（网站图标）
favicon: /favicon.ico # 网站favicon图标路径

# Avatar (头像)
avatar:
  # img: https://bu.dusays.com/2023/04/27/64496e511b09c.jpg # 头像图片链接
  img: /head.png # 头像图片链接
  effect: false # 是否开启头像特效

# 禁用所有横幅图片
disable_top_img: false # 设为true则禁用所有页面的顶部横幅图片

# 首页横幅图片
index_img: false # 首页顶部大图，false则不显示，或填写背景图片URL

# 页面默认顶部图片
default_top_img: /新品主题.png #false # 当页面没有设置top_img时，默认显示的顶部图片

# 文章封面配置
cover:
  # 是否显示文章封面
  index_enable: true # 首页是否显示封面
  aside_enable: true # 侧边栏是否显示封面
  archives_enable: true # 归档页是否显示封面
  # 封面在首页显示的位置
  # left/right/both (左/右/两边)
  position: left
  # 当没有设置cover时，默认显示以下封面
  default_cover:
    # - /img/default_cover.jpg
    - /img/default_cover.png

# 替换无法显示的图片
error_img:
  flink: /img/friend_404.gif # 友链页面图片加载失败时的替换图片
  post_page: /img/404.jpg # 文章页面图片加载失败时的替换图片

# 404页面配置
error_404:
  enable: true # 是否启用404页面
  subtitle: "请尝试站内搜索寻找文章" # 404页面提示文字
  background: https://bu.dusays.com/2023/05/08/645907596997d.gif # 404页面背景图片

# ==========================================
# 文章元信息配置 (Post Meta)
# ==========================================
post_meta:
  page: # 首页文章列表的元信息
    date_type: created # 日期类型: created=创建日 / updated=更新日 / both=两者都显示
    date_format: simple # 日期格式: date=日期 / relative=相对日期 / simple=简单日期
    categories: false # 是否显示分类
    tags: false # 是否显示标签
    label: false # 是否显示描述性文字
  post: # 文章详情页的元信息
    date_type: both # 日期类型: created=创建日 / updated=更新日 / both=两者都显示
    date_format: date # 日期格式: date=日期 / relative=相对日期
    categories: false # 是否显示分类
    tags: false # 是否显示标签
    label: true # 是否显示描述性文字
    unread: false # 是否开启文章未读功能

# ==========================================
# 主色调配置 (Main Tone)
# ==========================================
# 主色调相关配置
mainTone:
  enable: true # 是否启用获取图片主色调功能
  # 主色调获取模式:
  colorthief: "#037BFE"  # 亮蓝色 前端获取图片主色调
  # cdn: 图片url+imageAve参数获取主色调
  # api: 请求API获取主色调
  # both: 先请求cdn参数，无法获取则请求API
  # 也可在文章内配置 main_color: '#3e5658' 直接使用十六进制颜色
  mode: api
  # 项目地址: https://github.com/anzhiyu-c/img2color-go
  api: https://img2color-go.vercel.app/api?img= # mode为api时填写API地址
  cover_change: true # 整篇文章是否跟随封面图修改主色调

# ==========================================
# 字数统计配置 (Wordcount)
# ==========================================
# wordcount (字数统计)
wordcount:
  enable: false # 是否启用字数统计
  post_wordcount: true # 是否显示文章字数
  min2read: true # 是否显示阅读时间
  total_wordcount: true # 是否显示站点总字数

# ==========================================
# 首页文章摘要配置 (Index Post Content)
# ==========================================
# 首页显示文章摘要的方式
# 1: 显示 Front-matter 中的 description
# 2: both (有description则显示，否则显示自动摘要)
# 3: auto_excerpt 自动摘要 (默认)
# false: 不显示文章摘要
index_post_content:
  method: 3 # 摘要显示方式
  length: 500 # 摘要字数限制 (method为2或3时生效)

# ==========================================
# 页面锚点配置 (Anchor)
# ==========================================
# 页面滚动时URL是否跟随标题ID更新
anchor: false

# ==========================================
# 文章配置 (Post)
# ==========================================
# Post
# --------------------------------------

# 文章目录 (toc)
toc:
  post: true # 文章页是否显示目录
  page: false # 独立页面是否显示目录
  number: true # 目录是否显示编号
  expand: false # 目录是否默认展开
  style_simple: false # 是否使用简洁样式 (仅文章页生效)

# 文章版权信息
post_copyright:
  enable: true # 是否启用版权声明
  decode: false # 是否对版权信息进行URL解码
  author_href: # 作者链接
  location: 成都 # 作者所在地
  license: CC BY-NC-SA 4.0 # 版权协议名称
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/ # 版权协议链接
  avatarSinks: false # hover时头像是否下沉
  copyright_author_img_back: # 版权区域背景图片
  copyright_author_img_front: # 版权区域前景图片
  copyright_author_link: / # 版权作者链接

# ==========================================
# 打赏/赞助配置 (Reward)
# ==========================================
# Sponsor/reward (赞助/打赏)
reward:
  enable: false # 是否启用打赏功能
  QR_code:
    - img: https://npm.elemecdn.com/anzhiyu-blog@1.1.6/img/post/common/qrcode-weichat.png # 打赏二维码图片
      link: # 二维码跳转链接
      text: 微信 # 打赏方式文字
    - img: https://npm.elemecdn.com/anzhiyu-blog@1.1.6/img/post/common/qrcode-alipay.png # 打赏二维码图片
      link: # 二维码跳转链接
      text: 支付宝 # 打赏方式文字

# ==========================================
# 文章在线编辑配置 (Post Edit)
# ==========================================
# Post edit (在线编辑文章源码)
# 目前仅可选择一个平台在线编辑
post_edit:
  enable: false # 是否启用在线编辑
  # GitHub 在线编辑
  github: false # 是否启用GitHub在线编辑
  # 语雀在线编辑
  yuque: false # 是否启用语雀在线编辑

# ==========================================
# 相关文章配置 (Related Posts)
# ==========================================
# Related Articles (相关文章推荐)
related_post:
  enable: true # 是否启用相关文章推荐
  limit: 6 # 显示相关文章的数量
  date_type: created # 日期显示类型: created=创建日 / updated=更新日

# figcaption (图片描述文字)
photofigcaption: false # 是否显示图片的描述文字

# ==========================================
# 文章分页配置 (Post Pagination)
# ==========================================
# post_pagination (文章上下篇导航)
# 可选值: 1 / 2 / 3 / 4 / false
# 1: 下一篇链向旧文章
# 2: 下一篇链向新文章
# 3: 只有下一篇，在文章滚动到评论区时显示(旧文章)
# 4: 只有下一篇，在文章滚动到评论区时显示(旧文章)，显示图片cover
# false: 禁用分页
post_pagination: 2

# ==========================================
# 文章过期提醒配置 (Notice Outdate)
# ==========================================
# 文章过期提醒
noticeOutdate:
  enable: false # 是否启用过期提醒
  style: flat # 提示样式: simple=简单 / flat=扁平
  limit_day: 365 # 多少天后显示过期提醒
  position: top # 提示位置: top=顶部 / bottom=底部
  message_prev: It has been # 提示文字前缀
  message_next: days since the last update, the content of the article may be outdated. # 提示文字后缀

# ==========================================
# 分享系统配置 (Share System)
# ==========================================
# Share System (分享功能)
# --------------------------------------

# Share.js 分享
# https://github.com/overtrue/share.js
sharejs:
  enable: true # 是否启用 Share.js 分享
  sites: facebook,twitter,wechat,weibo,qq # 启用的分享平台

# AddToAny 分享
# https://www.addtoany.com/
addtoany:
  enable: false # 是否启用 AddToAny 分享
  item: facebook,twitter,wechat,sina_weibo,email,copy_link # 启用的分享平台

# Comments System
# --------------------------------------

# ==========================================
# 评论系统配置 (Comments System)
# ==========================================
# Comments System
# --------------------------------------

# 通用评论配置
comments:
  # 最多支持两个评论系统，第一个将作为默认显示
  # 可选: Valine/Waline/Twikoo/Artalk
  use: # 使用的评论系统，如 Twikoo/Waline
  text: true # 是否在按钮旁显示评论名称
  # lazyload: 评论系统在进入视口时才加载
  # 如果设为true，评论计数将无效
  lazyload: false # 是否启用懒加载
  count: false # 是否在文章顶部图片显示评论计数
  card_post_count: false # 是否在首页显示评论计数

# ==========================================
# Valine 评论系统
# ==========================================
# valine (无后端评论系统)
# https://valine.js.org
valine:
  appId: xxxxx # LeanCloud 应用 App ID
  appKey: xxxxx # LeanCloud 应用 App Key
  pageSize: 10 # 评论列表每页数量
  avatar: mp # 头像来源: https://valine.js.org/#/avatar
  lang: zh-CN # 语言: zh-CN/zh-TW/en/ja
  placeholder: 填写QQ邮箱就会使用QQ头像喔~. # 评论框占位文字
  guest_info: nick,mail,link # 评论者信息字段 (nick/mail/link)
  recordIP: false # 是否记录评论者IP
  serverURLs: # 国内自定义域名用户可配置，海外版自动检测无需填写
  bg: /img/comment_bg.png # 评论框背景图片
  emojiCDN: //i0.hdslb.com/bfs/emote/ # 表情包CDN地址
  enableQQ: true # 是否启用QQ昵称和头像自动获取
  requiredFields: nick,mail # 必填字段 (nick/mail)
  visitor: false # 是否开启文章阅读量统计
  master: # 博主标识
    - xxxxx
  friends: # 朋友标识
    - xxxxxx
  tagMeta: "博主,小伙伴,访客" # 标签元数据
  option: # 其他可选配置

# ==========================================
# Waline 评论系统
# ==========================================
# waline - 基于Valine的后端评论系统
# https://waline.js.org/
waline:
  serverURL: # Waline 服务端地址
  bg: # Waline 背景图片
  pageview: false # 是否启用页面访问量统计
  meta_css: false # 是否引入 waline-meta.css 以显示meta图标
  imageUploader: true # 是否启用图片上传功能
  # 以下为可选配置，后续若有新增/修改配置参数可在此自行添加/修改
  option: # 其他可选配置

# ==========================================
# Twikoo 评论系统
# ==========================================
# Twikoo (腾讯云开发的评论系统)
# https://github.com/imaegoo/twikoo
twikoo:
  envId: # 腾讯云环境ID
  region: # 腾讯云区域，如 ap-shanghai
  visitor: false # 是否开启文章阅读量统计
  option: # 其他可选配置

# ==========================================
# Artalk 评论系统
# ==========================================
# Artalk (自托管评论系统)
# https://artalk.js.org/guide/frontend/config.html
artalk:
  server: # Artalk 服务端地址
  site: # 站点名称
  visitor: false # 是否开启文章阅读量统计
  option: # 其他可选配置

# ==========================================
# Giscus 评论系统
# ==========================================
# giscus (基于GitHub Discussions的评论系统)
# https://giscus.app/
giscus:
  repo: # GitHub 仓库名称
  repo_id: # GitHub 仓库 ID
  category_id: # GitHub 仓库分类 ID
  theme:
    light: light # 浅色模式主题
    dark: dark # 深色模式主题
  option: # 其他可选配置
    data-lang: zh-CN # 语言
    data-mapping: # 页面映射方式
    data-category: # 分类
    data-input-position: # 评论输入框位置

# ==========================================
# 在线客服配置 (Chat Services)
# ==========================================
# Chat Services
# --------------------------------------

# 聊天按钮（推荐使用）
# 会在网站右下角创建一个按钮，隐藏原始聊天按钮
chat_btn: false # 是否启用聊天按钮

# 原始聊天按钮：向上滚动时显示，向下滚动时隐藏
chat_hide_show: false # 是否启用滚动时显示/隐藏聊天按钮

# chatra 在线客服
# https://chatra.io/
chatra:
  enable: false # 是否启用 Chatra
  id: # Chatra ID

# tidio 在线客服
# https://www.tidio.com/
tidio:
  enable: false # 是否启用 Tidio
  public_key: # Tidio 公钥

# daovoice 在线客服
# http://daovoice.io/
daovoice:
  enable: false # 是否启用 Daovoice
  app_id: # Daovoice App ID

# crisp 在线客服
# https://crisp.chat/en/
crisp:
  enable: false # 是否启用 Crisp
  website_id: # Crisp 网站ID

# ==========================================
# 页脚配置 (Footer Settings)
# ==========================================
# Footer Settings
# --------------------------------------
