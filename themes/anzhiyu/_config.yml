# ==========================================

# 标签卖萌 (离开/返回页面时修改标题)
diytitle:
  enable: true # 是否启用标签卖萌
  leaveTitle: 毅学就会卡丁车 # 离开页面时显示的标题
  backTitle: 欢迎肥来！ # 返回页面时显示的标题

# 留言弹幕配置
comment_barrage_config:
  enable: false # 是否启用留言弹幕
  maxBarrage: 1 # 同时最多显示弹幕数
  barrageTime: 4000 # 弹幕显示间隔时间 (毫秒)
  accessToken: "" # Twikoo 访问令牌，在控制台中获取
  mailMd5: "" # 博主邮箱 MD5 值

# 左下角音乐播放器配置
# https://github.com/metowolf/MetingJS
nav_music:
  enable: true # 是否启用左下角音乐播放器
  console_widescreen_music: true # 宽屏状态控制台显示音乐而不是标签
  id: 8152976493 # 歌单/专辑 ID
  server: netease # 音乐平台: netease=网易云 / tencent=QQ音乐 等
  volume: 0.7 # 默认音量 (0~1)
